<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>85-Day SE Asia Adventure Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 40px; left: 0; right: 0; bottom: 0; z-index: 1; }

        .sidebar {
            position: absolute; left: 0; top: 40px; bottom: 0; width: 320px;
            background: white; box-shadow: 2px 0 8px rgba(0,0,0,0.15);
            z-index: 100; overflow-y: auto; transition: transform 0.3s ease;
            height: calc(100vh - 40px);
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        .sidebar.dark-mode { background: #1f2937; color: #f3f4f6; }

        .sidebar-header {
            padding: 16px; background: linear-gradient(135deg, #047857 0%, #7c2d12 100%);
            color: white; position: sticky; top: 0; z-index: 101;
        }
        .sidebar-header h1 { font-size: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .sidebar-header .trip-stats { font-size: 12px; opacity: 0.9; }

        .controls {
            padding: 12px; border-bottom: 1px solid #e5e7eb;
            display: flex; gap: 6px; flex-wrap: wrap;
            position: sticky; top: 80px; z-index: 100; background: inherit;
        }
        .sidebar.dark-mode .controls { border-bottom-color: #374151; }

        .btn {
            padding: 5px 10px; border: 1px solid #d1d5db; background: white;
            border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s;
        }
        .sidebar.dark-mode .btn { background: #374151; border-color: #4b5563; color: #f3f4f6; }
        .btn:hover { background: #f3f4f6; }
        .sidebar.dark-mode .btn:hover { background: #4b5563; }
        .btn.active { background: #047857; color: white; border-color: #047857; }

        .search-box {
            width: calc(100% - 24px); margin: 8px 12px; padding: 7px 10px;
            border: 1px solid #d1d5db; border-radius: 4px; font-size: 12px;
        }
        .sidebar.dark-mode .search-box { background: #374151; border-color: #4b5563; color: #f3f4f6; }

        /* Alternate routes section */
        .alt-routes-section {
            padding: 8px 12px 10px; border-bottom: 1px solid #e5e7eb; background: #fafafa;
        }
        .sidebar.dark-mode .alt-routes-section { background: #111827; border-bottom-color: #374151; }
        .alt-section-title {
            font-size: 10px; font-weight: 700; color: #9ca3af;
            letter-spacing: 0.08em; margin-bottom: 6px; text-transform: uppercase;
        }
        .alt-btn {
            display: block; width: 100%; padding: 6px 10px; margin-bottom: 4px;
            border: 1px solid #d1d5db; border-radius: 6px; background: white;
            cursor: pointer; font-size: 12px; text-align: left; transition: all 0.2s;
        }
        .sidebar.dark-mode .alt-btn { background: #1f2937; border-color: #374151; color: #f3f4f6; }
        .alt-btn:hover { background: #eff6ff; border-color: #047857; }
        .alt-btn.active { background: #eff6ff; border-color: #047857; color: #3730a3; font-weight: 600; }
        .sidebar.dark-mode .alt-btn.active { background: #1e3a5f; border-color: #047857; color: #a5b4fc; }
        .alt-btn-desc { font-size: 10px; color: #9ca3af; margin-top: 2px; display: none; }
        .alt-btn.active .alt-btn-desc { display: block; }

        /* Steps container */
        .steps-container { padding: 8px; }

        /* Step cards */
        .step-card {
            background: white; border-radius: 8px; border: 1px solid #e5e7eb;
            margin-bottom: 7px; overflow: hidden; transition: opacity 0.2s, box-shadow 0.2s;
        }
        .sidebar.dark-mode .step-card { background: #1f2937; border-color: #374151; }
        .step-card.vietnam  { border-left: 4px solid #dc2626; }
        .step-card.laos     { border-left: 4px solid #b45309; }
        .step-card.thailand { border-left: 4px solid #7c3aed; }
        .step-card.philippines { border-left: 4px solid #2563eb; }
        .step-card.indonesia { border-left: 4px solid #e11d48; }
        .step-card.disabled { opacity: 0.38; }
        .step-card.dragging { opacity: 0.3; box-shadow: 0 4px 16px rgba(4,120,87,0.4); }
        .step-card.drag-over { box-shadow: 0 -3px 0 0 #047857; }
        .step-card.alt-step { border-style: dashed; }

        .step-card-header {
            display: flex; align-items: center; gap: 5px;
            padding: 9px 8px 9px 6px; user-select: none;
        }
        .drag-handle { cursor: grab; font-size: 16px; color: #9ca3af; padding: 0 2px; line-height: 1; }
        .drag-handle:active { cursor: grabbing; }
        .country-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .step-name { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar.dark-mode .step-name { color: #f3f4f6; }
        .step-days { font-size: 10px; color: #9ca3af; white-space: nowrap; }

        .step-toggle-btn {
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d1d5db;
            background: white; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 9px; flex-shrink: 0; transition: all 0.2s;
        }
        .step-toggle-btn.on { background: #047857; border-color: #047857; color: white; }
        .sidebar.dark-mode .step-toggle-btn { background: #374151; border-color: #4b5563; }

        .step-expand-btn {
            width: 20px; height: 20px; border: none; background: none;
            cursor: pointer; font-size: 11px; color: #9ca3af;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s; flex-shrink: 0;
        }
        .step-expand-btn.open { transform: rotate(180deg); }

        .step-poi-count {
            font-size: 11px; color: #9ca3af; padding: 0 10px 4px 30px; cursor: pointer;
        }
        .step-poi-count:hover { color: #047857; }

        .poi-list { display: none; border-top: 1px solid #f3f4f6; }
        .sidebar.dark-mode .poi-list { border-top-color: #374151; }
        .poi-list.open { display: block; }

        .poi-item {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px 5px 24px; border-bottom: 1px solid #f9fafb; font-size: 12px;
        }
        .sidebar.dark-mode .poi-item { border-bottom-color: #374151; }
        .poi-item:last-child { border-bottom: none; }

        .poi-eye-btn {
            width: 18px; height: 18px; border: none; background: none; cursor: pointer;
            font-size: 12px; color: #9ca3af; flex-shrink: 0; transition: color 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .poi-eye-btn.hidden-poi { color: #d1d5db; }
        .poi-name { flex: 1; color: #374151; cursor: pointer; }
        .sidebar.dark-mode .poi-name { color: #d1d5db; }
        .poi-name:hover { color: #047857; }
        .poi-tag {
            font-size: 10px; background: #eff6ff; color: #0369a1;
            padding: 1px 5px; border-radius: 3px; white-space: nowrap;
        }
        .sidebar.dark-mode .poi-tag { background: #1e3a5f; color: #93c5fd; }

        .step-transport-info {
            padding: 3px 10px 7px 30px; font-size: 11px; color: #6b7280; font-style: italic;
        }
        .sidebar.dark-mode .step-transport-info { color: #9ca3af; }

        .toggle-sidebar {
            position: absolute; left: 320px; top: 10px; background: white;
            border: 1px solid #d1d5db; border-radius: 4px; padding: 8px 10px;
            cursor: pointer; z-index: 99; transition: left 0.3s ease;
        }
        .toggle-sidebar .toggle-label { display: none; }
        .sidebar.collapsed ~ .toggle-sidebar { left: 10px; }

        .top-controls { position: absolute; top: 10px; right: 10px; z-index: 50; display: flex; gap: 8px; }

        .legend {
            position: absolute; bottom: 20px; right: 20px; background: white;
            padding: 12px 16px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 12px; z-index: 50; max-width: 220px;
        }
        .legend.dark-mode { background: #1f2937; color: #f3f4f6; }
        .legend-title { font-weight: 600; margin-bottom: 8px; font-size: 13px; }
        .legend-section { margin-bottom: 10px; }
        .legend-section-title { font-weight: 500; font-size: 10px; color: #6b7280; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .legend.dark-mode .legend-section-title { color: #9ca3af; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
        .legend-color { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); flex-shrink: 0; }
        .legend-line { height: 3px; width: 20px; flex-shrink: 0; border-radius: 2px; }
        .legend-line-dashed { height: 0; width: 20px; flex-shrink: 0; }

        .leaflet-popup-content { font-size: 13px; max-width: 260px; }
        .popup-title { font-weight: 600; color: #111; margin-bottom: 4px; font-size: 14px; }
        .popup-day { color: #047857; font-weight: 500; font-size: 12px; margin-bottom: 4px; }
        .popup-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
        .popup-tag { display: inline-block; background: #eff6ff; color: #0369a1; padding: 2px 6px; border-radius: 3px; font-size: 11px; }
        .popup-desc { color: #374151; font-size: 12px; line-height: 1.4; }

        .trip-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: linear-gradient(135deg,#047857,#7c2d12); padding: 8px 0; box-shadow: 0 4px 20px rgba(0,0,0,.2); }
        .trip-nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .trip-nav a { color: white; text-decoration: none; font-size: .8rem; font-weight: 500; padding: 4px 10px; border-radius: 6px; transition: background .2s; }
        .trip-nav a:hover:not(.active) { background: rgba(255,255,255,.2); transform: translateY(-1px); }
        .trip-nav a.active { background: rgba(255,255,255,.22); position: relative; }
        .trip-nav a.active::after { content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: white; border-radius: 3px; }

        @media (max-width: 768px) {
            /* Nav */
            .trip-nav-inner { gap: 6px; padding: 0 10px; overflow-x: auto; flex-wrap: nowrap; }
            .trip-nav a { font-size: .72rem; padding: 3px 8px; white-space: nowrap; }
            /* Sidebar becomes full-width bottom panel */
            .sidebar {
                width: 100% !important;
                max-height: 52vh;
                overflow-y: auto;
                bottom: 0;
                top: auto;
                left: 0;
                right: 0;
                height: auto;
                border-top: 2px solid #047857;
                border-radius: 12px 12px 0 0;
                box-shadow: 0 -4px 20px rgba(0,0,0,.2);
            }
            .sidebar.collapsed {
                transform: translateY(100%) !important;
            }
            /* Map fills top portion */
            #map {
                top: 40px;
                bottom: 52vh;
            }
            /* Toggle button — above sidebar */
            .toggle-sidebar {
                position: fixed !important;
                left: 50% !important;
                transform: translateX(-50%);
                bottom: 52vh !important;
                top: auto !important;
                z-index: 200 !important;
                box-shadow: 0 2px 8px rgba(0,0,0,.25);
                border-radius: 20px;
                padding: 6px 16px;
                font-size: 12px;
            }
            .toggle-sidebar .toggle-label { display: inline; margin-left: 4px; }
            .sidebar.collapsed ~ .toggle-sidebar {
                bottom: 8px !important;
                left: 50% !important;
            }
            /* Compact step cards on mobile */
            .step-card-header { padding: 10px 8px; }
            .step-name { font-size: 12px; }
            .alt-btn { font-size: 11px; padding: 7px 10px; }
            /* Top controls — show only essential buttons, stack them smaller */
            .top-controls { top: 50px; right: 8px; gap: 5px; }
            .top-controls button { font-size: 11px; padding: 5px 8px; }
            /* Popups — wider on mobile */
            .leaflet-popup-content { max-width: calc(100vw - 60px); font-size: 12px; }
            /* Legend hidden */
            .legend { display: none; }
            /* Sidebar header compact */
            .sidebar-header { padding: 12px; }
            .sidebar-header h1 { font-size: 15px; }
        }
        @media (max-width: 480px) {
            .sidebar { max-height: 48vh; }
            #map { bottom: 48vh; }
            .toggle-sidebar { bottom: 48vh !important; }
            .sidebar.collapsed ~ .toggle-sidebar { bottom: 8px !important; }
            .controls { gap: 4px; padding: 8px; }
            .btn { font-size: 10px; padding: 4px 7px; }
        }

        /* ── EDIT MODE ─────────────────────────────────────────────────────── */
        body.edit-mode .sidebar { border-right: 3px solid #f59e0b; }

        .step-edit-btn {
            width: 20px; height: 20px; border: none; background: none;
            cursor: pointer; font-size: 13px; color: #d1d5db;
            display: none; flex-shrink: 0; align-items: center; justify-content: center;
            transition: color 0.2s;
        }
        .step-edit-btn:hover { color: #f59e0b; }
        body.edit-mode .step-edit-btn { display: flex; }

        .step-editor {
            display: none; padding: 10px 12px 12px; background: #fffbeb;
            border-top: 1px solid #fde68a;
        }
        .step-editor.open { display: block; }
        .sidebar.dark-mode .step-editor { background: #1c1a10; border-top-color: #78350f; }

        .edit-field { margin-bottom: 7px; }
        .edit-field label {
            font-size: 10px; color: #92400e; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            display: block; margin-bottom: 2px;
        }
        .sidebar.dark-mode .edit-field label { color: #fbbf24; }
        .edit-field input, .edit-field select, .edit-field textarea {
            width: 100%; padding: 4px 7px; border: 1px solid #fde68a; border-radius: 3px;
            font-size: 11px; background: white; box-sizing: border-box; font-family: inherit;
        }
        .sidebar.dark-mode .edit-field input,
        .sidebar.dark-mode .edit-field select,
        .sidebar.dark-mode .edit-field textarea { background: #374151; color: #f3f4f6; border-color: #78350f; }
        .edit-field textarea { font-family: monospace; height: 72px; resize: vertical; }
        .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .edit-btns { display: flex; gap: 5px; margin-top: 8px; }
        .edit-save-btn {
            flex: 2; padding: 5px; background: #f59e0b; color: white;
            border: none; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: 700;
        }
        .edit-save-btn:hover { background: #d97706; }
        .edit-cancel-btn {
            flex: 1; padding: 5px; background: #e5e7eb; color: #374151;
            border: none; border-radius: 3px; cursor: pointer; font-size: 11px;
        }
        .edit-advanced-toggle {
            font-size: 10px; color: #92400e; cursor: pointer;
            text-decoration: underline; margin-top: 5px; display: inline-block;
        }
        .sidebar.dark-mode .edit-advanced-toggle { color: #fbbf24; }
        .edit-advanced { display: none; margin-top: 6px; }
        .edit-advanced.open { display: block; }

        /* Alt route edit controls */
        .alt-btn-row { display: flex; align-items: flex-start; gap: 4px; margin-bottom: 4px; }
        .alt-btn-row .alt-btn { flex: 1; margin-bottom: 0; }
        .alt-edit-icon, .alt-del-icon {
            display: none; width: 22px; height: 22px; border: 1px solid #d1d5db;
            background: white; border-radius: 3px; cursor: pointer; font-size: 11px;
            flex-shrink: 0; align-items: center; justify-content: center; margin-top: 1px;
        }
        .alt-edit-icon:hover { background: #eff6ff; border-color: #047857; }
        .alt-del-icon:hover { background: #fef2f2; border-color: #ef4444; color: #ef4444; }
        body.edit-mode .alt-edit-icon,
        body.edit-mode .alt-del-icon { display: flex; }
        .sidebar.dark-mode .alt-edit-icon,
        .sidebar.dark-mode .alt-del-icon { background: #374151; border-color: #4b5563; color: #f3f4f6; }

        .add-alt-btn {
            display: none; width: 100%; padding: 6px; margin-top: 4px;
            border: 1px dashed #047857; background: transparent; border-radius: 5px;
            cursor: pointer; font-size: 11px; color: #047857; text-align: center;
        }
        .sidebar.dark-mode .add-alt-btn { color: #a5b4fc; border-color: #a5b4fc; }
        body.edit-mode .add-alt-btn { display: block; }

        /* Export / edit-mode toggle */
        .edit-mode-btn { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
        .edit-mode-btn.active { background: #f59e0b; color: white; border-color: #f59e0b; }
        .sidebar.dark-mode .edit-mode-btn { background: #78350f; color: #fde68a; border-color: #92400e; }
        .sidebar.dark-mode .edit-mode-btn.active { background: #f59e0b; color: white; }

        .export-btn {
            display: none; position: fixed; bottom: 20px; left: 340px;
            padding: 8px 14px; background: #f59e0b; color: white; border: none;
            border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700;
            z-index: 200; box-shadow: 0 2px 8px rgba(245,158,11,0.45);
            transition: left 0.3s ease;
        }
        .export-btn:hover { background: #d97706; }
        body.edit-mode .export-btn { display: block; }
        .sidebar.collapsed ~ .export-btn { left: 20px; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white; border-radius: 10px; padding: 20px 22px;
            max-width: 580px; width: 95vw; max-height: 88vh;
            overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.25);
        }
        .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #374151; }
        .modal .edit-field label { color: #374151; }
        .modal .edit-field textarea { height: 100px; }
        .modal-btns { display: flex; gap: 6px; margin-top: 14px; }
        .modal-save-btn {
            flex: 2; padding: 7px; background: #047857; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700;
        }
        .modal-save-btn:hover { background: #4f46e5; }
        .modal-delete-btn {
            flex: 1; padding: 7px; background: #ef4444; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700;
        }
        .modal-delete-btn:hover { background: #dc2626; }
        .modal-cancel-btn {
            flex: 1; padding: 7px; background: #e5e7eb; color: #374151;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .disable-steps-list {
            max-height: 140px; overflow-y: auto; border: 1px solid #e5e7eb;
            border-radius: 3px; padding: 4px 6px; background: #f9fafb;
        }
        .disable-step-item {
            display: flex; align-items: center; gap: 5px;
            padding: 2px 0; font-size: 11px; color: #374151; cursor: pointer;
        }
        .disable-step-item input { width: auto; cursor: pointer; }
        .modal-note { font-size: 10px; color: #9ca3af; margin-top: 3px; font-style: italic; }
    </style>
</head>
<body>
    <div class="trip-nav"><div class="trip-nav-inner">
        <a href="index.html">Hub</a>
        <a href="southeast-asia-vietnam-start.html">Itinerary</a>
        <a href="booking-reference.html">Bookings</a>
        <a href="trip-map-detailed.html" class="active">Map</a>
        <a href="trip-budget-tracker.html">Budget</a>
    </div></div>

    <div id="map"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-map-location-dot"></i> 85-Day SE Asia</h1>
            <div class="trip-stats">
                <div>Days 1–85 &nbsp;•&nbsp; 5 Countries</div>
                <div id="statsLine">31 steps &nbsp;•&nbsp; 170+ POIs</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn active" data-country="all" onclick="toggleCountry('all')">All</button>
            <button class="btn" data-country="vietnam" onclick="toggleCountry('vietnam')">Vietnam</button>
            <button class="btn" data-country="laos" onclick="toggleCountry('laos')">Laos</button>
            <button class="btn" data-country="thailand" onclick="toggleCountry('thailand')">Thailand</button>
            <button class="btn" data-country="philippines" onclick="toggleCountry('philippines')">Philippines</button>
            <button class="btn" data-country="indonesia" onclick="toggleCountry('indonesia')">Indonesia</button>
            <button class="btn" onclick="toggleDarkMode()" title="Dark Mode" aria-label="Toggle dark mode">🌙</button>
            <button class="btn edit-mode-btn" id="editModeBtn" onclick="toggleEditMode()" title="Toggle Edit Mode" aria-label="Toggle edit mode" aria-pressed="false">✏️ Edit</button>
        </div>
        <input type="text" class="search-box" id="searchBox" placeholder="Search steps &amp; POIs…" oninput="filterSteps()">
        <div class="alt-routes-section" id="altRoutesSection">
            <div class="alt-section-title">Alternate Routes</div>
            <div id="altBtnList"></div>
            <button class="add-alt-btn" onclick="openAltEditor(null)">+ Add New Alternate Route</button>
        </div>
        <div class="steps-container" id="stepsContainer"></div>
    </div>

    <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i> <span class="toggle-label">Route</span></button>

    <div class="top-controls">
        <button class="btn" onclick="fitToRoute()"><i class="fas fa-expand"></i> Fit</button>
    </div>

    <div class="legend" id="legend"></div>

    <button class="export-btn" onclick="exportData()" title="Copy current route data to clipboard">📋 Copy Data</button>

    <!-- Alternate Route Editor Modal -->
    <div class="modal-overlay" id="altModal">
        <div class="modal">
            <h3 id="altModalTitle">Edit Alternate Route</h3>
            <input type="hidden" id="altModalId">
            <div class="edit-field">
                <label>Alternate ID (no spaces, use hyphens)</label>
                <input type="text" id="altModalKey" placeholder="e.g. my-alternate">
                <div class="modal-note">Used internally. Cannot change ID of existing alternate.</div>
            </div>

    // ── STATE ────────────────────────────────────────────────────────────────
    let activeCountries = new Set(Object.keys(COUNTRY_COLORS));
    let darkMode = false;
    let activeAlternates = new Set();
    let activeShadowSegments = {};
    let allMarkers = [];
    let routeLines = [];
    let dragSrcId = null;

    // ── MAP INIT ─────────────────────────────────────────────────────────────
    const map = L.map('map').setView([13.0, 105.0], 5);
    let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors, © CARTO', maxZoom: 20, minZoom: 3
    }).addTo(map);

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function getColor(type) { return TRANSPORT_COLORS[type] || '#6b7280'; }

    function drawPolyline(coords, type, isShadow) {
        const color = isShadow ? '#9ca3af' : getColor(type);
        const dash  = isShadow ? '8,6' : (TRANSPORT_DASH[type] || null);
        const wt    = isShadow ? 1.5 : (type === 'flight' ? 2 : 3);
        const op    = isShadow ? 0.3 : 0.75;
        const line  = L.polyline(coords, {color, weight:wt, opacity:op, dashArray:dash});
        line.addTo(map);
        return line;
    }

    function createMarker(lat, lng, color, size, popupHtml, opacity) {
        const m = L.circleMarker([lat, lng], {
            radius: size / 2, fillColor: color, color: '#fff',
            weight: size > 10 ? 2 : 1.5, opacity: 1, fillOpacity: opacity || 0.85,
        });
        if (popupHtml) m.bindPopup(popupHtml);
        return m;
    }

    function stepPopup(step) {
        return `<div class="popup-title">${step.name}</div>
                <div class="popup-day">Days ${step.days}</div>
                <div class="popup-desc">${step.pois.length} POIs</div>`;
    }
    function poiPopup(poi) {
        return `<div class="popup-title">${poi.name}</div>
                <div class="popup-day">Day ${poi.day}</div>
                <div class="popup-tags">${poi.tags.map(t=>`<span class="popup-tag">${t}</span>`).join('')}</div>
                <div class="popup-desc">${poi.desc}</div>`;
    }

    // ── RENDER MARKERS ───────────────────────────────────────────────────────
    function renderAllMarkers() {
        allMarkers.forEach(({marker}) => map.removeLayer(marker));
        allMarkers = [];
        itinerarySteps.forEach(step => {
            if (!activeCountries.has(step.country)) return;
            const color = COUNTRY_COLORS[step.country];
            const stepM = createMarker(step.lat, step.lng, color, step.enabled ? 18 : 12, stepPopup(step), 0.85);
            stepM.on('click', () => stepM.openPopup());
            if (step.enabled) stepM.addTo(map);
            allMarkers.push({marker: stepM, stepId: step.id, isStep: true});

            if (!step.enabled) return;
            (step.pois || []).forEach(poi => {
                if (poi.hidden) return;
                const pm = createMarker(poi.lat, poi.lng, color, 9, poiPopup(poi), 0.45);
                pm.on('click', () => pm.openPopup());
                pm.addTo(map);
                allMarkers.push({marker: pm, stepId: step.id, poiId: poi.id});
            });
        });
    }

    // ── RENDER ROUTE ─────────────────────────────────────────────────────────
    function renderRoute() {
        routeLines.forEach(l => map.removeLayer(l));
        routeLines = [];

        // Shadow segments (displaced by alternates)
        Object.values(activeShadowSegments).forEach(segs => {
            segs.forEach(seg => {
                routeLines.push(drawPolyline([[seg.fromLat, seg.fromLng],[seg.toLat, seg.toLng]], seg.type, true));
            });
        });

        // Main route
        const enabled = itinerarySteps.filter(s => s.enabled && activeCountries.has(s.country));
        for (let i = 0; i < enabled.length - 1; i++) {
            const from = enabled[i], to = enabled[i + 1];
            if (!from.transportTo) continue;
            const tr = from.transportTo;
            if (tr.legs) {
                let pLat = from.lat, pLng = from.lng;
                tr.legs.forEach(leg => {
                    const tLat = (leg.toLat != null) ? leg.toLat : to.lat;
                    const tLng = (leg.toLng != null) ? leg.toLng : to.lng;
                    routeLines.push(drawPolyline([[pLat, pLng],[tLat, tLng]], leg.type, false));
                    pLat = tLat; pLng = tLng;
                });
            } else {
                const coords = [[from.lat, from.lng]];
                if (tr.waypoints) tr.waypoints.forEach(wp => coords.push([wp.lat, wp.lng]));
                coords.push([to.lat, to.lng]);
                routeLines.push(drawPolyline(coords, tr.type, false));
            }
        }
    }

    // ── RENDER STEP LIST ─────────────────────────────────────────────────────

                        </div>
                    </div>
                    <div class="edit-field">
                        <label>Country</label>
                        <select id="en-country-${step.id}">
                            ${['vietnam','laos','thailand','philippines','indonesia'].map(c=>`<option value="${c}"${c===step.country?' selected':''}>${c}</option>`).join('')}
                        </select>
                    </div>
                    <div class="edit-row">
                        <div class="edit-field">
                            <label>Transport Type</label>
                            <select id="en-type-${step.id}">${trTypeOpts}</select>
                        </div>
                        <div class="edit-field">

                    <span class="edit-advanced-toggle" onclick="toggleAdvanced('${step.id}')">▸ Advanced (multi-leg JSON)</span>
                    <div class="edit-advanced" id="adv-${step.id}">
                        <div class="edit-field">
                            <label>Full transportTo JSON (overrides type+label when open)</label>
                            <textarea id="en-json-${step.id}">${trJsonSafe}</textarea>
                        </div>
                    </div>
                    <div class="edit-btns">
                        <button class="edit-save-btn" onclick="saveStepEdit('${step.id}')">Save</button>
                        <button class="edit-cancel-btn" onclick="closeStepEditor('${step.id}')">Cancel</button>
                    </div>
                </div>`;

            return `<div class="step-card ${step.country}${step.enabled?'':' disabled'}${isAlt?' alt-step':''}"
                        id="card-${step.id}" style="${vis}"
                        draggable="true"
                        ondragstart="onDragStart(event,'${step.id}')"
                        ondragover="onDragOver(event)"
                        ondrop="onDrop(event,'${step.id}')"
                        ondragend="onDragEnd(event)">
                <div class="step-card-header">
                    <span class="drag-handle">⠿</span>
                    <span class="country-dot" style="background:${color}"></span>
                    <span class="step-name" onclick="flyToStep(${step.lat},${step.lng})" style="cursor:pointer" title="Fly to ${step.name}">${step.name}</span>
                    <span class="step-days">${step.days}</span>
                    <button class="step-toggle-btn${step.enabled?' on':''}" onclick="toggleStep('${step.id}')" title="${step.enabled?'Disable':'Enable'}">
                        ${step.enabled ? '✓' : '○'}
                    </button>
                    ${poiCount>0 ? `<button class="step-expand-btn" id="expbtn-${step.id}" onclick="toggleExpand('${step.id}')">▾</button>` : '<span style="width:20px"></span>'}
                    <button class="step-edit-btn" onclick="toggleStepEditor('${step.id}')" title="Edit step">✎</button>
                </div>
                ${editorHtml}
                ${poiCount>0 ? `
                <div class="step-poi-count" onclick="toggleExpand('${step.id}')">▸ ${poiCount} POI${poiCount>1?'s':''}</div>

                    ${(step.pois||[]).map(poi=>`
                    <div class="poi-item">
                        <button class="poi-eye-btn${poi.hidden?' hidden-poi':''}" onclick="togglePOI('${step.id}','${poi.id}')" title="Show/hide on map">👁</button>

                        <span class="poi-tag">${poi.tags[0]}</span>

                </div>` : ''}
                ${trLabel && idx < itinerarySteps.length-1 ? `
                <div class="step-transport-info" style="color:${trColor}">→ ${trLabel}</div>` : ''}
            </div>`;
        }).join('');
        renderAltButtons();
    }

    function renderAltButtons() {
        const container = document.getElementById('altBtnList');
        if (!container) return;
        container.innerHTML = Object.entries(alternates).map(([id, alt]) => {
            const isActive = activeAlternates.has(id);
            return `<div class="alt-btn-row">
                <button class="alt-btn${isActive?' active':''}" id="altbtn-${id}" onclick="toggleAlternate('${id}')">
                    ${alt.name}
                    <div class="alt-btn-desc">${alt.desc || ''}</div>
                </button>
                <button class="alt-edit-icon" onclick="openAltEditor('${id}')" title="Edit alternate">✎</button>
                <button class="alt-del-icon" onclick="confirmDeleteAlt('${id}')" title="Delete alternate">✕</button>
            </div>`;
        }).join('');
        updateAltButtons();
    }

    // ── STEP INTERACTIONS ─────────────────────────────────────────────────────
    function toggleStep(id) {
        const step = itinerarySteps.find(s => s.id === id);
        if (!step) return;
        step.enabled = !step.enabled;
        renderStepList();
        renderAllMarkers();
        renderRoute();
    }

    function toggleExpand(id) {
        const list = document.getElementById('pois-' + id);
        const btn  = document.getElementById('expbtn-' + id);
        if (!list) return;
        list.classList.toggle('open');
        if (btn) btn.classList.toggle('open');
    }

    function togglePOI(stepId, poiId) {
        const step = itinerarySteps.find(s => s.id === stepId);
        if (!step) return;
        const poi = step.pois.find(p => p.id === poiId);
        if (!poi) return;
        poi.hidden = !poi.hidden;
        renderStepList();
        renderAllMarkers();
        // Re-open the poi list
        const list = document.getElementById('pois-' + stepId);
        const btn  = document.getElementById('expbtn-' + stepId);
        if (list) { list.classList.add('open'); }
        if (btn)  { btn.classList.add('open'); }
    }

    function flyToStep(lat, lng) { map.setView([lat, lng], 12); }
    function fitToRoute() {
        const pts = itinerarySteps.filter(s => s.enabled).map(s => [s.lat, s.lng]);
        if (pts.length) map.fitBounds(L.latLngBounds(pts), {padding:[50,50]});
    }

    // ── DRAG AND DROP ─────────────────────────────────────────────────────────
    function onDragStart(e, id) {
        dragSrcId = id;
        e.dataTransfer.effectAllowed = 'move';
        document.getElementById('card-' + id).classList.add('dragging');
    }
    function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function onDrop(e, targetId) {
        e.preventDefault();
        if (!dragSrcId || dragSrcId === targetId) return;
        const fromIdx = itinerarySteps.findIndex(s => s.id === dragSrcId);
        const toIdx   = itinerarySteps.findIndex(s => s.id === targetId);
        if (fromIdx < 0 || toIdx < 0) return;
        const [moved] = itinerarySteps.splice(fromIdx, 1);
        itinerarySteps.splice(toIdx, 0, moved);
        dragSrcId = null;
        renderStepList();
        renderRoute();
    }
    function onDragEnd(e) {
        dragSrcId = null;
        document.querySelectorAll('.step-card.dragging').forEach(el => el.classList.remove('dragging'));
    }

    // ── ALTERNATES ────────────────────────────────────────────────────────────
    function applyAlternate(altId) {
        const alt = alternates[altId];
        if (!alt) return;
        // Override transportTo
        for (const [sid, override] of Object.entries(alt.overrides || {})) {
            const s = itinerarySteps.find(x => x.id === sid);
            if (s) s.transportTo = Object.assign({}, override);
        }
        // Disable steps
        (alt.disableSteps || []).forEach(sid => {
            const s = itinerarySteps.find(x => x.id === sid);
            if (s) s.enabled = false;
        });
        // Insert new steps
        if (alt.insertAfter && alt.newSteps && alt.newSteps.length) {
            const idx = itinerarySteps.findIndex(s => s.id === alt.insertAfter);
            if (idx >= 0) {
                const toInsert = alt.newSteps.map(s => Object.assign({}, s, {_altId: altId}));
                itinerarySteps.splice(idx + 1, 0, ...toInsert);
            }
        }
        activeShadowSegments[altId] = (alt.shadowSegments || []).slice();
    }

    function toggleAlternate(altId) {
        const alt = alternates[altId];
        if (!alt) return;
        if (activeAlternates.has(altId)) {
            activeAlternates.delete(altId);
        } else {
            // Mutual exclusion
            (alt.mutuallyExclusiveWith || []).forEach(id => activeAlternates.delete(id));
            activeAlternates.add(altId);
        }
        // Restore original steps
        itinerarySteps.length = 0;
        JSON.parse(JSON.stringify(originalSteps)).forEach(s => itinerarySteps.push(s));
        activeShadowSegments = {};
        // Re-apply all active alternates
        activeAlternates.forEach(id => applyAlternate(id));

        renderAllMarkers();
        renderStepList();
        renderRoute();
        updateAltButtons();
    }

    function updateAltButtons() {
        Object.keys(alternates).forEach(id => {
            const btn = document.getElementById('altbtn-' + id);
            if (btn) btn.classList.toggle('active', activeAlternates.has(id));
        });
    }

    // ── EDIT MODE ─────────────────────────────────────────────────────────────
    let editMode = false;

    function toggleEditMode() {
        editMode = !editMode;
        document.body.classList.toggle('edit-mode', editMode);
        const btn = document.getElementById('editModeBtn');
        if (btn) { btn.classList.toggle('active', editMode); btn.setAttribute('aria-pressed', editMode); }
        // Close any open step editors when leaving edit mode
        if (!editMode) {
            document.querySelectorAll('.step-editor.open').forEach(el => el.classList.remove('open'));
        }
    }

    function toggleStepEditor(id) {
        const editor = document.getElementById('editor-' + id);
        if (!editor) return;
        const isOpen = editor.classList.contains('open');
        // Close all other open editors
        document.querySelectorAll('.step-editor.open').forEach(el => el.classList.remove('open'));
        if (!isOpen) editor.classList.add('open');
    }

    function closeStepEditor(id) {
        const editor = document.getElementById('editor-' + id);
        if (editor) editor.classList.remove('open');
    }

    function toggleAdvanced(id) {
        const adv = document.getElementById('adv-' + id);
        if (!adv) return;
        adv.classList.toggle('open');
        const toggle = adv.previousElementSibling;
        if (toggle) toggle.textContent = adv.classList.contains('open')
            ? '▾ Advanced (multi-leg JSON)' : '▸ Advanced (multi-leg JSON)';
    }

    function saveStepEdit(id) {
        const step = itinerarySteps.find(s => s.id === id);
        if (!step) return;

        const adv = document.getElementById('adv-' + id);
        if (adv && adv.classList.contains('open')) {
            // Use raw JSON textarea
            const rawEl = document.getElementById('en-json-' + id);
            if (rawEl) {
                try {
                    const raw = rawEl.value.trim();
                    step.transportTo = raw ? JSON.parse(raw) : null;
                } catch(e) {
                    alert('Invalid JSON in transportTo field:\n' + e.message);
                    return;
                }
            }
        } else {
            // Use simple fields
            const typeEl  = document.getElementById('en-type-' + id);
            const labelEl = document.getElementById('en-label-' + id);
            const type  = typeEl  ? typeEl.value  : null;
            const label = labelEl ? labelEl.value.trim() : '';
            if (!type || type === 'none') {
                step.transportTo = null;
            } else {
                // Preserve existing legs/waypoints if type+label only changed
                const existing = step.transportTo || {};
                step.transportTo = Object.assign({}, existing, {type, label});
            }
        }

        // Update basic fields
        const nameEl    = document.getElementById('en-name-' + id);
        const daysEl    = document.getElementById('en-days-' + id);
        const latEl     = document.getElementById('en-lat-' + id);
        const lngEl     = document.getElementById('en-lng-' + id);
        const countryEl = document.getElementById('en-country-' + id);
        if (nameEl    && nameEl.value.trim())    step.name    = nameEl.value.trim();
        if (daysEl    && daysEl.value.trim())    step.days    = daysEl.value.trim();
        if (latEl     && latEl.value)            step.lat     = parseFloat(latEl.value);
        if (lngEl     && lngEl.value)            step.lng     = parseFloat(lngEl.value);
        if (countryEl && countryEl.value)        step.country = countryEl.value;

        renderStepList();
        renderAllMarkers();
        renderRoute();
    }

    // ── ALTERNATE EDITOR ──────────────────────────────────────────────────────
    let _editingAltId = null; // null = new

    function openAltEditor(id) {
        _editingAltId = id;
        const modal = document.getElementById('altModal');
        const alt = id ? alternates[id] : null;

        document.getElementById('altModalTitle').textContent = id ? 'Edit Alternate Route' : 'New Alternate Route';
        document.getElementById('altModalKey').value = id || '';
        document.getElementById('altModalKey').readOnly = !!id;
        document.getElementById('altModalName').value = (alt && alt.name) || '';
        document.getElementById('altModalMutex').value = (alt && alt.mutuallyExclusiveWith) ? alt.mutuallyExclusiveWith.join(', ') : '';
        document.getElementById('altModalOverrides').value = (alt && alt.overrides) ? JSON.stringify(alt.overrides, null, 2) : '{}';
        document.getElementById('altModalNewSteps').value = (alt && alt.newSteps && alt.newSteps.length) ? JSON.stringify(alt.newSteps, null, 2) : '[]';
        document.getElementById('altModalShadow').value = (alt && alt.shadowSegments && alt.shadowSegments.length) ? JSON.stringify(alt.shadowSegments, null, 2) : '[]';

        // Populate insertAfter dropdown
        const sel = document.getElementById('altModalInsertAfter');
        sel.innerHTML = '<option value="">— none —</option>';
        originalSteps.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name + ' (' + s.id + ')';
            if (alt && alt.insertAfter === s.id) opt.selected = true;
            sel.appendChild(opt);
        });

        // Populate disable steps checklist
        const list = document.getElementById('altModalDisableList');
        list.innerHTML = originalSteps.map(s => {
            const checked = (alt && alt.disableSteps && alt.disableSteps.includes(s.id)) ? 'checked' : '';
            return `<label class="disable-step-item">
                <input type="checkbox" value="${s.id}" ${checked}> ${s.name} (${s.id})
            </label>`;
        }).join('');

        // Show/hide delete button
        document.getElementById('altModalDeleteBtn').style.display = id ? '' : 'none';

        modal.classList.add('open');
    }

    function closeAltModal() {
        document.getElementById('altModal').classList.remove('open');
        _editingAltId = null;
    }

    function saveAltEdit() {
        const key = document.getElementById('altModalKey').value.trim();
        if (!key) { alert('Alternate ID is required.'); return; }
        if (!/^[a-z0-9-]+$/.test(key)) { alert('ID must be lowercase letters, numbers, and hyphens only.'); return; }

        let overrides, newSteps, shadowSegments;
        try { overrides = JSON.parse(document.getElementById('altModalOverrides').value || '{}'); } catch(e) { alert('Overrides JSON error: ' + e.message); return; }
        try { newSteps  = JSON.parse(document.getElementById('altModalNewSteps').value  || '[]'); } catch(e) { alert('New Steps JSON error: '  + e.message); return; }
        try { shadowSegments = JSON.parse(document.getElementById('altModalShadow').value || '[]'); } catch(e) { alert('Shadow Segments JSON error: ' + e.message); return; }

        const disableSteps = Array.from(document.querySelectorAll('#altModalDisableList input:checked')).map(el => el.value);
        const mutex = document.getElementById('altModalMutex').value.trim();
        const mutuallyExclusiveWith = mutex ? mutex.split(',').map(s=>s.trim()).filter(Boolean) : [];

        const altData = {
            name: document.getElementById('altModalName').value.trim() || key,
            desc: newSteps.length
                ? newSteps.map(s=>s.name).join(' → ')
                : Object.keys(overrides).length ? 'Transport override' : '',
            mutuallyExclusiveWith,
            insertAfter: document.getElementById('altModalInsertAfter').value || null,
            newSteps,
            overrides,
            disableSteps,
            shadowSegments,
        };

        alternates[key] = altData;

        // If it was active, re-apply
        if (activeAlternates.has(key)) {
            toggleAlternate(key); // remove
            toggleAlternate(key); // re-add
        }

        closeAltModal();
        renderStepList();
    }

    function confirmDeleteAlt(id) {
        if (!confirm('Delete alternate "' + (alternates[id] ? alternates[id].name : id) + '"?')) return;
        deleteAlt(id);
    }

    function deleteAlt(id) {
        const altId = id || _editingAltId;
        if (!altId) return;
        if (activeAlternates.has(altId)) {
            activeAlternates.delete(altId);
            itinerarySteps.length = 0;
            JSON.parse(JSON.stringify(originalSteps)).forEach(s => itinerarySteps.push(s));
            activeShadowSegments = {};
            activeAlternates.forEach(id2 => applyAlternate(id2));
        }
        delete alternates[altId];
        closeAltModal();
        renderStepList();
        renderAllMarkers();
        renderRoute();
    }

    // ── EXPORT DATA ───────────────────────────────────────────────────────────
    function exportData() {
        // Produce clean copies (strip _altId markers)
        const cleanSteps = JSON.parse(JSON.stringify(originalSteps));
        const cleanAlts  = JSON.parse(JSON.stringify(alternates));

        let out = '// ── ITINERARY STEPS ──\nconst itinerarySteps = ';
        out += JSON.stringify(cleanSteps, null, 2);
        out += ';\n\n// ── ALTERNATES ──\nconst alternates = ';
        out += JSON.stringify(cleanAlts, null, 2);
        out += ';';

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(out).then(() => {
                const btn = document.querySelector('.export-btn');
                if (btn) { btn.textContent = '✓ Copied!'; setTimeout(()=>{ btn.textContent='📋 Copy Data'; },2000); }
            }).catch(() => fallbackCopy(out));
        } else {
            fallbackCopy(out);
        }
    }

    function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Data copied to clipboard (fallback). Paste into the itinerarySteps / alternates section of the HTML file.');
    }

    // ── COUNTRY FILTER ────────────────────────────────────────────────────────
    function toggleCountry(country) {
        document.querySelectorAll('.controls .btn[data-country]').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.country === country || (country === 'all' && btn.dataset.country === 'all'));
        });
        activeCountries = country === 'all' ? new Set(Object.keys(COUNTRY_COLORS)) : new Set([country]);
        // Update step card visibility
        itinerarySteps.forEach(s => {
            const card = document.getElementById('card-' + s.id);
            if (card) card.style.display = activeCountries.has(s.country) ? '' : 'none';
        });
        renderAllMarkers();
        renderRoute();
    }

    // ── SEARCH ────────────────────────────────────────────────────────────────
    function filterSteps() {
        const q = document.getElementById('searchBox').value.toLowerCase().trim();
        itinerarySteps.forEach(step => {
            const card = document.getElementById('card-' + step.id);
            if (!card || !activeCountries.has(step.country)) return;
            if (!q) { card.style.display = ''; return; }
            const text = (step.name + ' ' + step.days + ' ' + (step.pois||[]).map(p=>p.name).join(' ')).toLowerCase();
            card.style.display = text.includes(q) ? '' : 'none';
        });
    }

    // ── UI ─────────────────────────────────────────────────────────────────────
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleDarkMode() {
        darkMode = !darkMode;
        document.getElementById('sidebar').classList.toggle('dark-mode', darkMode);
        document.getElementById('legend').classList.toggle('dark-mode', darkMode);
        map.removeLayer(tileLayer);
        tileLayer = L.tileLayer(darkMode
            ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
            : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
            { attribution: '© OpenStreetMap contributors, © CARTO', maxZoom: 20, minZoom: 3 }
        ).addTo(map);
    }

    // ── LEGEND ─────────────────────────────────────────────────────────────────
    function createLegend() {
        const modes = [
            {type:'train',     label:'Train'},
            {type:'bus',       label:'Bus'},
            {type:'ferry',     label:'Ferry'},
            {type:'flight',    label:'Flight'},
            {type:'slow-boat', label:'Slow Boat'},
            {type:'fast-boat', label:'Fast Boat'},
        ];
        const countries = Object.entries(COUNTRY_COLORS);
        document.getElementById('legend').innerHTML = `
            <div class="legend-title">🗺️ 85-Day SE Asia</div>
            <div class="legend-section">
                <div class="legend-section-title">Transport</div>
                ${modes.map(m => {
                    const color = getColor(m.type);
                    const dash  = TRANSPORT_DASH[m.type];
                    const lineStyle = dash
                        ? `border-top: 2.5px dashed ${color}; height:0; background:none;`
                        : `background:${color}; height:3px;`;
                    return `<div class="legend-item">
                        <div style="width:20px;flex-shrink:0;${lineStyle}"></div>
                        <span>${m.label}</span>
                    </div>`;
                }).join('')}
            </div>
            <div class="legend-section">
                <div class="legend-section-title">Countries</div>
                ${countries.map(([k,c]) => `<div class="legend-item">
                    <div class="legend-color" style="background:${c}"></div>
                    <span style="text-transform:capitalize">${k}</span>
                </div>`).join('')}
            </div>
            <div class="legend-section">
                <div class="legend-section-title">Route Variants</div>
                <div class="legend-item">
                    <div style="width:20px;height:3px;background:#6b7280;flex-shrink:0;border-radius:2px"></div>
                    <span>Active route</span>
                </div>
                <div class="legend-item">
                    <div style="width:20px;height:0;border-top:2px dashed #9ca3af;flex-shrink:0"></div>
                    <span>Displaced (original)</span>
                </div>
                <div class="legend-item">
                    <div style="width:20px;height:3px;border:1px dashed #047857;flex-shrink:0"></div>
                    <span>Alternate step card</span>
                </div>
            </div>
        `;
    }

    // ── INIT ──────────────────────────────────────────────────────────────────
    renderAllMarkers();
    renderStepList();
    renderRoute();
    createLegend();
    fitToRoute();

    // Start sidebar collapsed on mobile
    if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.add('collapsed');
    }
    </script>
</body>
</html>
